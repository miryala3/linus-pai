name: AIO Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }} · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install system deps (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake build-essential libopenblas-dev -qq

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip wheel setuptools
          pip install -r requirements.txt
          pip install pytest pytest-cov
          # CPU-only llama-cpp for CI (no Metal/CUDA in GitHub Actions)
          pip install llama-cpp-python --no-cache-dir

      - name: Run tests (no live API, no network)
        run: |
          pytest test_aio.py -v --tb=short \
            --ignore-glob="*live*" \
            -k "not Live and not Network" \
            --cov=aio --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check aio.py test_aio.py --select E,F,W --ignore E501,W503

  syntax:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify aio.py syntax
        run: python -c "import ast; ast.parse(open('aio.py').read()); print('OK')"
      - name: Verify test_aio.py syntax
        run: python -c "import ast; ast.parse(open('test_aio.py').read()); print('OK')"
      - name: Verify shell scripts
        run: bash -n runaio.sh && bash -n stopaio.sh && echo "Shell OK"
