name: PAI Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }} · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install system deps (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake build-essential libopenblas-dev -qq

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip wheel setuptools
          pip install -r requirements.txt
          pip install pytest pytest-cov
          pip install llama-cpp-python --no-cache-dir

      # Use bash on all platforms so backslash line-continuation works (avoids
      # the Windows PowerShell parser error with multi-line pytest commands).
      - name: Run tests (no live API, no network)
        shell: bash
        run: |
          pytest test_pai.py -v --tb=short \
            -k "not Live and not Network" \
            --cov=pai --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      # W503 is a flake8-only code not recognised by ruff — removed
      - run: ruff check pai.py test_pai.py samples/ --select E,F,W --ignore E501

  syntax:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify pai.py syntax
        run: python -c "import ast; ast.parse(open('pai.py').read()); print('pai.py OK')"
      - name: Verify test_pai.py syntax
        run: python -c "import ast; ast.parse(open('test_pai.py').read()); print('test_pai.py OK')"
      - name: Verify build/launcher.py syntax
        run: python -c "import ast; ast.parse(open('build/launcher.py').read()); print('launcher.py OK')"
      - name: Verify shell scripts
        run: bash -n runpai.sh && bash -n stoppai.sh && bash -n pai && echo "Shell OK"
      - name: Verify sample scripts
        run: |
          for f in samples/*.py; do
            python -c "import ast; ast.parse(open('$f').read())"
            echo "$f OK"
          done
